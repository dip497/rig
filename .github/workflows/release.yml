name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rig
            asset_name: rig-linux-x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rig
            asset_name: rig-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rig
            asset_name: rig-macos-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rig.exe
            asset_name: rig-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rig-linux-x86_64/rig
            rig-macos-x86_64/rig
            rig-macos-aarch64/rig
            rig-windows-x86_64.exe/rig.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
